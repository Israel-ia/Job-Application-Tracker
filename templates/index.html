<!DOCTYPE html>
<html>
<head>
    <title>Job Application Tracker</title>
</head>
<body>

    <h1>Job Application Tracker</h1>

    <p>Track your job applications and recruiting progress.</p>

    <a href="/add">Add Application</a>

    <hr>

    <h2>Applications</h2>

<table border="1">

    <tr>
        <th>Company</th>
        <th>Position</th>
        <th>Date Applied</th>
        <th>Status</th>
    </tr>

    {% for application in applications %}

    <tr>
        <td>{{ application[1] }}</td>
        <td>{{ application[2] }}</td>
        <td>{{ application[4] }}</td>
        <td>{{ application[3] }}</td>
    </tr>

    {% endfor %}

</table>

</body>
</html>
